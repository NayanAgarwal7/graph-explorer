<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Explorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Graph Explorer</h1>

    <div id="controls">
        <label for="algorithmSelect">Algorithm:</label>
        <select id="algorithmSelect">
            <option value="bfs">BFS</option>
            <option value="dfs">DFS</option>
            <option value="dijkstra">Dijkstra</option>
        </select>

        <button id="runAlgorithmBtn">Run</button>
        <button id="nextStepBtn">Next Step</button>
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetTraversalBtn">Reset Traversal</button>

        <label>
            <input type="checkbox" id="predictModeToggle">
            Predict Mode
        </label>
    </div>

    <div id="workspace">
        <canvas id="graphCanvas" width="800" height="600"></canvas>

        <div id="sidebar">
            <h2>Data Structure</h2>
            <div id="ds-panel">
                <p><strong>Controls</strong></p>
                <p>Left click empty space → add node</p>
                <p>Left click node, then another node → add edge</p>
                <p>Right click node → delete node</p>
                <p>Right click edge → delete edge</p>
            </div>

            <h2>Algorithm Output</h2>
            <div id="algorithmOutput">
                <p>No algorithm run yet.</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='graph.js') }}"></script>
</body>
</html>
